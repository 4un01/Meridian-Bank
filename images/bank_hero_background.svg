<svg viewBox="0 0 1440 600" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#daeef9"/>
      <stop offset="30%" stop-color="#c2e3f5"/>
      <stop offset="60%" stop-color="#a8d8f0"/>
      <stop offset="100%" stop-color="#bde5f7"/>
    </linearGradient>
    <radialGradient id="glow1" cx="75%" cy="20%" r="40%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="10%" cy="80%" r="30%">
      <stop offset="0%" stop-color="#5badda" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#5badda" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow3" cx="85%" cy="85%" r="20%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="chipGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c8a84b"/>
      <stop offset="100%" stop-color="#e6c96b"/>
    </linearGradient>
    <linearGradient id="cardFrontGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0f8ff"/>
      <stop offset="100%" stop-color="#daeef9"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    </pattern>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#0a5082" flood-opacity="0.18"/>
    </filter>
    <filter id="badgeShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0a5082" flood-opacity="0.13"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1440" height="600" fill="url(#bg)"/>
  <rect width="1440" height="600" fill="url(#grid)"/>
  <rect width="1440" height="600" fill="url(#glow1)"/>
  <rect width="1440" height="600" fill="url(#glow2)"/>
  <rect width="1440" height="600" fill="url(#glow3)"/>

  <!-- Background circles -->
  <circle cx="1180" cy="-60" r="340" fill="white" opacity="0.14"/>
  <circle cx="120" cy="520" r="200" fill="#5badda" opacity="0.10"/>
  <circle cx="1050" cy="490" r="110" fill="white" opacity="0.18"/>
  <circle cx="580" cy="100" r="52" fill="#2a87c4" opacity="0.20"/>
  <circle cx="-60" cy="80" r="180" fill="white" opacity="0.10"/>
  <circle cx="1360" cy="360" r="130" fill="#a8d8f0" opacity="0.22"/>

  <!-- Card back -->
  <g transform="translate(940,172) rotate(-8)" opacity="0.6">
    <rect width="300" height="186" rx="18" fill="#1a6fa0"/>
  </g>

  <!-- Card mid -->
  <g transform="translate(952,180) rotate(-3)" opacity="0.78">
    <rect width="300" height="186" rx="18" fill="#2a8fc4"/>
  </g>

  <!-- Card front -->
  <g transform="translate(958,178) rotate(2)" filter="url(#cardShadow)">
    <rect width="300" height="186" rx="18" fill="url(#cardFrontGrad)" stroke="white" stroke-opacity="0.9" stroke-width="1"/>
    <!-- Chip -->
    <rect x="22" y="22" width="34" height="25" rx="4" fill="url(#chipGrad)"/>
    <!-- Card number -->
    <text x="22" y="112" font-family="'Courier New', Courier, monospace" font-size="13" fill="#2a6080" letter-spacing="3">4821  ····  ····  3096</text>
    <!-- Cardholder name -->
    <text x="22" y="150" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="700" fill="#1a5070" letter-spacing="2">J. HARGREAVES</text>
    <!-- Mastercard red circle -->
    <circle cx="256" cy="155" r="13" fill="#d1424b" opacity="0.85"/>
    <!-- Mastercard orange circle -->
    <circle cx="270" cy="155" r="13" fill="#f59c1a" opacity="0.85"/>
  </g>

  <!-- Badge: Payment sent -->
  <g transform="translate(1240,155)" filter="url(#badgeShadow)">
    <rect width="185" height="54" rx="12" fill="white" opacity="0.97"/>
    <circle cx="27" cy="27" r="15" fill="#e8f7ed"/>
    <path d="M20 27 L24 31 L34 21" stroke="#2a9d5c" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <text x="50" y="22" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" fill="#1a3d52">Payment sent</text>
    <text x="50" y="38" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#5a8fa8">£1,250.00 · just now</text>
  </g>

  <!-- Badge: Savings growing -->
  <g transform="translate(900,368)" filter="url(#badgeShadow)">
    <rect width="185" height="54" rx="12" fill="white" opacity="0.97"/>
    <circle cx="27" cy="27" r="15" fill="#daeef9"/>
    <path d="M27 18 L27 34 M20 27 L27 34 L34 27" stroke="#0a5c8a" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <text x="50" y="22" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" fill="#1a3d52">Savings growing</text>
    <text x="50" y="38" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#5a8fa8">+4.85% AER · ISA</text>
  </g>

</svg>
